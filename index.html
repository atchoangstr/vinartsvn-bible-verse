<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VINARTSVN — Daily Scripture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap');

  /* ════════════════════════════════════════
     1. VARIABLES
  ════════════════════════════════════════ */
  :root {
    --sky-1: #F6FBFF;
    --sky-2: #E7F4FF;
    --sky-3: #D7ECFF;
    --text-deep: #1A3A5C;
    --text-soft: #002f5e;
    --text-hint: #1A3A5C;
    --accent: #4A90C4;
    --gold: #C9A84C;
    --glass-bg: rgba(255, 255, 255, 0.42);
    --glass-border: rgba(255, 255, 255, 0.65);

    --font-display: 'Literata', Georgia, serif;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

    --space-xs: 12px;
    --space-sm: 20px;
    --space-md: 32px;
    --space-lg: 40px;

    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ════════════════════════════════════════
     2. RESET
  ════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    font-family: var(--font-ui);
    background: url('bible-verse-background 5.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    animation: pageIn 1s var(--ease-out) forwards;
  }
  button { font: inherit; color: inherit; background: none; border: none; }

  /* Mobile */
@media (max-width: 768px) {
    body {
        background: url("bible-background mobile.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
}

  /* ════════════════════════════════════════
     3. TYPOGRAPHY
  ════════════════════════════════════════ */
  .brand-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 4px;
    color: var(--text-deep);
    text-transform: uppercase;
  }
  .brand-tagline {
    font-family: var(--font-ui);
    font-size: 16px;
    font-weight: 400;
    color: var(--text-soft);
    letter-spacing: 0.3px;
    margin-top: 8px;
  }
  .verse-text {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 400;
    line-height: 1.8;
    letter-spacing: 0;
    color: var(--text-deep);
    text-align: center;
    max-width: 650px;
  }
  .verse-ref {
    display: block;
    font-family: var(--font-ui);
    font-size: 16px;
    font-weight: 500;
    color: var(--text-soft);
    opacity: 0.8;
    text-align: center;
  }
  .verse-ref::before { content: '— '; }
  .hint {
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 600;
    color: var(--text-hint);
    opacity: 0.8;
    text-align: center;
    cursor: pointer;

    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    padding: 10px 18px;
    background: rgba(255, 255, 255, 1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 999px;
}

  /* ════════════════════════════════════════
     4. LAYOUT
  ════════════════════════════════════════ */
  .app {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 520px;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: max(28px, env(safe-area-inset-top)) 24px max(28px, env(safe-area-inset-bottom));
  }
  .brand { text-align: center; }
  .card {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: var(--space-lg);
    padding: 44px 32px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow:
      0 8px 40px rgba(120, 180, 240, 0.14),
      0 1px 0 rgba(255, 255, 255, 0.5) inset;
  }
  .hint { margin-top: var(--space-lg); }

  /* ════════════════════════════════════════
     5. COMPONENTS
  ════════════════════════════════════════ */
  .quote-icon {
    display: block;
    width: 24px;
    height: 24px;
    margin-bottom: var(--space-sm);
    opacity: 0.3;
  }
  .verse-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .verse-text { margin-bottom: var(--space-md); }

  /* ════════════════════════════════════════
     6. ANIMATIONS
  ════════════════════════════════════════ */
  @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }

  .verse-wrap {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
    transition: opacity 320ms var(--ease-out), transform 320ms var(--ease-out), filter 320ms var(--ease-out);
  }
  .verse-wrap.is-transitioning {
    opacity: 0;
    transform: scale(0.98);
    filter: blur(4px);
  }

  @keyframes rayPulse { 0%, 100% { opacity: var(--base-op, 0.5); } 50% { opacity: 0.15; } }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-110vh) scale(0.8); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    body { animation: none; }
    .ray, .particle { animation: none !important; opacity: 0.3 !important; }
    .verse-wrap { transition: opacity 200ms linear; }
    .verse-wrap.is-transitioning { transform: none; filter: none; }
  }

  /* ════════════════════════════════════════
     7. BACKGROUND (decorative)
  ════════════════════════════════════════ */
  .rays {
    position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
    width: 900px; height: 600px; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .ray {
    position: absolute; top: 60px; left: 50%;
    width: 3px; height: 500px;
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.45), transparent);
    transform-origin: top center; border-radius: 2px;
    animation: rayPulse 7s ease-in-out infinite;
  }
  .ray:nth-child(1) { transform: rotate(-45deg); animation-delay: 0s; opacity: 0.18; }
  .ray:nth-child(2) { transform: rotate(-22deg); animation-delay: 0.5s; opacity: 0.24; width: 5px; }
  .ray:nth-child(3) { transform: rotate(0deg); animation-delay: 1s; opacity: 0.3; width: 6px; }
  .ray:nth-child(4) { transform: rotate(22deg); animation-delay: 0.5s; opacity: 0.24; width: 5px; }
  .ray:nth-child(5) { transform: rotate(45deg); animation-delay: 0s; opacity: 0.18; }

  .cross-watermark {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 280px; height: 280px; pointer-events: none; z-index: 0; opacity: 0.035;
  }
  .cross-v { position: absolute; left: 50%; top: 10%; width: 28px; height: 80%; background: var(--accent); transform: translateX(-50%); border-radius: 4px; }
  .cross-h { position: absolute; top: 28%; left: 10%; width: 80%; height: 28px; background: var(--accent); border-radius: 4px; }

  .bokeh { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.85) 0%, rgba(180, 220, 255, 0.25) 60%, transparent 100%);
    animation: floatUp linear infinite;
  }

  /* ════════════════════════════════════════
     8. RESPONSIVE
  ════════════════════════════════════════ */
  @media (max-height: 700px) {
    .card { padding: 32px 24px; margin-top: var(--space-md); }
    .verse-text { font-size: 21px; }
    .hint { margin-top: var(--space-md); }
  }
  @media (max-width: 360px) {
    .verse-text { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="rays" aria-hidden="true">

/* ════════════════════════════════════════
   VERSE DISPLAY
════════════════════════════════════════ */
const verseWrap = document.getElementById('verseWrap');
const verseText = document.getElementById('verseText');
const verseRef  = document.getElementById('verseRef');

let currentIndex = -1;
let isTransitioning = false;

function pickRandomVerse() {
  if (VERSES.length === 1) return 0;
  let next;
  do { next = Math.floor(Math.random() * VERSES.length); } while (next === currentIndex);
  return next;
}

function displayVerse(index) {
  currentIndex = index;
  verseText.textContent = VERSES[index].text;
  verseRef.textContent  = VERSES[index].ref;
}

function transitionToRandomVerse() {
  if (isTransitioning) return;
  isTransitioning = true;
  verseWrap.classList.add('is-transitioning');
  setTimeout(() => {
    displayVerse(pickRandomVerse());
    verseWrap.classList.remove('is-transitioning');
    isTransitioning = false;
  }, 320);
}

/* ════════════════════════════════════════
   AMBIENT PARTICLES
════════════════════════════════════════ */
const bokeh = document.getElementById('bokeh');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 12 + 4;
  const duration = Math.random() * 12 + 10;
  const delay = Math.random() * 6;
  p.style.cssText =
    `width:${size}px;height:${size}px;left:${Math.random() * 100}vw;bottom:-30px;` +
    `animation-duration:${duration}s;animation-delay:${delay}s;`;
  bokeh.appendChild(p);
  setTimeout(() => p.remove(), (duration + delay) * 1000 + 500);
}

function initParticles() {
  if (reduceMotion) return;
  for (let i = 0; i < 14; i++) spawnParticle();
  setInterval(spawnParticle, 1600);
}



/* ════════════════════════════════════════
   AMBIENT MUSIC
════════════════════════════════════════ */
const audio = document.getElementById('bgAudio');
audio.volume = 0.2;
let musicStarted = false;

function startMusic() {
  if (musicStarted) return;
  const playPromise = audio.play();
  if (playPromise && typeof playPromise.then === 'function') {
    playPromise.then(() => { musicStarted = true; }).catch(() => { /* blocked until next gesture */ });
  } else {
    musicStarted = true;
  }
}

/* ════════════════════════════════════════
   INTERACTION — tap anywhere for a new verse
════════════════════════════════════════ */
function handleInteraction() {
  startMusic();
  transitionToRandomVerse();
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function initApp() {
  displayVerse(pickRandomVerse());
  initParticles();
  startMusic();
  document.addEventListener('click', handleInteraction);
}

initApp();
</script>
</body>
